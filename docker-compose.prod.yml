name: ops-solutions

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ops_solutions}
      POSTGRES_USER: ${POSTGRES_USER:-ops_solutions}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ops_solutions_bootstrap_only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ops_solutions} -d ${POSTGRES_DB:-ops_solutions}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app_network
    mem_limit: 1536m
    cpus: 0.75

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_network
    mem_limit: 384m
    cpus: 0.25

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-postgresql://ops_solutions:ops_solutions_bootstrap_only@postgres:5432/ops_solutions}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "127.0.0.1:${API_PORT:-3211}:3001"
    networks:
      - app_network
    mem_limit: 768m
    cpus: 0.5

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-postgresql://ops_solutions:ops_solutions_bootstrap_only@postgres:5432/ops_solutions}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const fs=require('fs');const p='/tmp/worker-heartbeat';if(!fs.existsSync(p)||Date.now()-Number(fs.readFileSync(p,'utf8'))>90000)process.exit(1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app_network
    mem_limit: 768m
    cpus: 0.5

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      API_INTERNAL_URL: http://api:3001
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-Ops Solutions}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "127.0.0.1:${WEB_PORT:-3210}:3000"
    networks:
      - app_network
    mem_limit: 1024m
    cpus: 0.75

volumes:
  postgres_data:
  redis_data:

networks:
  app_network:
    driver: bridge
