name: Validate Platform

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Build and validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate API
        working-directory: apps/api
        run: |
          set -Eeuo pipefail
          npm install --no-audit --no-fund
          for file in src/*.js src/templates/*.js test/*.js; do node --check "$file"; done
          npm test

      - name: Validate worker
        working-directory: apps/worker
        run: |
          set -Eeuo pipefail
          npm install --no-audit --no-fund
          for file in src/*.js test/*.js; do node --check "$file"; done
          npm test

      - name: Validate HubSpot developer project
        run: |
          set -Eeuo pipefail
          node - <<'NODE'
          const fs = require('node:fs');
          const project = JSON.parse(fs.readFileSync('hubspot/hsproject.json', 'utf8'));
          const app = JSON.parse(fs.readFileSync('hubspot/src/app/app-hsmeta.json', 'utf8'));
          const expectedRedirect = 'https://ops.dashboardtalentera.tech/api/v1/hubspot/oauth/callback';

          if (project.platformVersion !== '2026.03') throw new Error('Unexpected HubSpot platform version');
          if (app.type !== 'app') throw new Error('Invalid HubSpot app component type');
          if (app.config.distribution !== 'private') throw new Error('HubSpot beta app must use private distribution');
          if (app.config.auth?.type !== 'oauth') throw new Error('HubSpot app must use OAuth');
          if (!app.config.auth.redirectUrls?.includes(expectedRedirect)) throw new Error('Production OAuth redirect URL is missing');
          if (!Array.isArray(app.config.auth.requiredScopes) || app.config.auth.requiredScopes.length === 0) {
            throw new Error('HubSpot required scopes are missing');
          }
          NODE

      - name: Build web application
        working-directory: apps/web
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: |
          set -Eeuo pipefail
          npm install --no-audit --no-fund
          node --test test/*.test.js
          npm run build > web-build.log 2>&1

      - name: Print web build diagnostics
        if: failure()
        working-directory: apps/web
        run: tail -n 160 web-build.log || true

      - name: Upload web build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-build-log-${{ github.run_id }}
          path: apps/web/web-build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Validate Docker Compose
        run: |
          set -Eeuo pipefail
          touch .env
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.prod.yml config --quiet
