name: Finalize scheduled reports lifecycle

on:
  push:
    branches:
      - feature/scheduled-report-orchestration

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[scheduled-lifecycle-integrated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/scheduled-report-orchestration
          fetch-depth: 0
      - name: Patch export lifecycle and schedule authorization
        run: |
          python - <<'PY'
          from pathlib import Path

          export_path = Path('apps/api/src/background-exports.js')
          text = export_path.read_text()
          success_marker = "    return { status: 'completed', fileSizeBytes: artifact.byteLength };"
          success_insert = """    await postgres.query(
      `WITH updated AS (
         UPDATE scheduled_report_executions
         SET status = 'ready_for_delivery', delivery_status = 'provider_not_configured',
             completed_at = NOW(), error = NULL
         WHERE export_job_id = $1 AND workspace_id = $2
         RETURNING schedule_id
       )
       UPDATE scheduled_report_schedules s
       SET last_success_at = NOW(), last_error = NULL, updated_at = NOW()
       FROM updated
       WHERE s.id = updated.schedule_id AND s.workspace_id = $2`,
      [exportJobId, workspaceId]
    ).catch((error) => {
      if (error.code !== '42P01') throw error;
    });
    return { status: 'completed', fileSizeBytes: artifact.byteLength };"""
          if success_marker not in text:
            raise SystemExit('success marker missing')
          text = text.replace(success_marker, success_insert, 1)

          failure_marker = "    throw error;\n  }\n}\n\nexport function registerBackgroundExportRoutes"
          failure_insert = """    if (finalAttempt) {
      await postgres.query(
        `WITH updated AS (
           UPDATE scheduled_report_executions
           SET status = 'failed', error = 'Export generation failed.', completed_at = NOW()
           WHERE export_job_id = $1 AND workspace_id = $2
           RETURNING schedule_id
         )
         UPDATE scheduled_report_schedules s
         SET last_failure_at = NOW(), last_error = 'Export generation failed.', updated_at = NOW()
         FROM updated
         WHERE s.id = updated.schedule_id AND s.workspace_id = $2`,
        [exportJobId, workspaceId]
      ).catch((scheduleError) => {
        if (scheduleError.code !== '42P01') throw scheduleError;
      });
    }
    throw error;
  }
}

export function registerBackgroundExportRoutes"""
          if failure_marker not in text:
            raise SystemExit('failure marker missing')
          export_path.write_text(text.replace(failure_marker, failure_insert, 1))

          schedule_path = Path('apps/api/src/scheduled-reports.js')
          schedule = schedule_path.read_text()
          update_marker = """    const result = await postgres.query(
      `UPDATE scheduled_report_schedules SET saved_view_id=$3,name=$4,frequency=$5,weekday=$6,monthday=$7,"""
          update_insert = """    const allowedView = await postgres.query(
      `SELECT 1 FROM saved_reporting_views WHERE id = $1 AND workspace_id = $2 AND user_id = $3 LIMIT 1`,
      [input.savedViewId, request.params.workspaceId, request.customer.user.id]
    );
    if (allowedView.rowCount === 0) throw scheduleError('Saved reporting view not found.', 'SAVED_VIEW_NOT_FOUND', 404);
    const result = await postgres.query(
      `UPDATE scheduled_report_schedules SET saved_view_id=$3,name=$4,frequency=$5,weekday=$6,monthday=$7,"""
          if update_marker not in schedule:
            raise SystemExit('schedule update marker missing')
          schedule_path.write_text(schedule.replace(update_marker, update_insert, 1))
          PY
          git rm .github/workflows/finalize-scheduled-reports.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/api/src/background-exports.js apps/api/src/scheduled-reports.js
          git commit -m "Complete scheduled report lifecycle [scheduled-lifecycle-integrated]"
          git push origin HEAD:feature/scheduled-report-orchestration
