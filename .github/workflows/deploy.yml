name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment files
        shell: bash
        run: |
          set -Eeuo pipefail

          if [[ ! -f docker-compose.prod.yml && ! -f docker-compose.yml ]]; then
            echo "Missing docker-compose.prod.yml or docker-compose.yml"
            exit 1
          fi

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          set -Eeuo pipefail

          : "${VPS_HOST:?Missing VPS_HOST secret}"
          : "${VPS_PORT:?Missing VPS_PORT secret}"

          install -m 700 -d "$HOME/.ssh"

          if [[ -n "${VPS_SSH_KEY_B64:-}" ]]; then
            printf '%s' "$VPS_SSH_KEY_B64" | base64 --decode > "$HOME/.ssh/deploy_key"
          elif [[ -n "${VPS_SSH_KEY:-}" ]]; then
            printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > "$HOME/.ssh/deploy_key"
          else
            echo "::error::Missing VPS_SSH_KEY_B64 or VPS_SSH_KEY secret"
            exit 1
          fi

          chmod 600 "$HOME/.ssh/deploy_key"

          if ! ssh-keygen -y -f "$HOME/.ssh/deploy_key" > /dev/null 2>&1; then
            echo "::error::The deployment SSH private key is invalid. Add VPS_SSH_KEY_B64 using a base64 encoded private key."
            exit 1
          fi

          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Prepare deployment directory
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          set -Eeuo pipefail

          : "${VPS_USER:?Missing VPS_USER secret}"
          : "${VPS_DEPLOY_PATH:?Missing VPS_DEPLOY_PATH secret}"

          ssh \
            -i "$HOME/.ssh/deploy_key" \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$VPS_USER@$VPS_HOST" \
            "mkdir -p '$VPS_DEPLOY_PATH' '$VPS_DEPLOY_PATH/.deploy-backups'"

      - name: Back up current application files
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          set -Eeuo pipefail

          ssh \
            -i "$HOME/.ssh/deploy_key" \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$VPS_USER@$VPS_HOST" \
            "set -Eeuo pipefail; \
             if [ -f '$VPS_DEPLOY_PATH/docker-compose.yml' ] || [ -f '$VPS_DEPLOY_PATH/docker-compose.prod.yml' ]; then \
               timestamp=\$(date +%Y%m%d-%H%M%S); \
               tar \
                 --exclude='.deploy-backups' \
                 --exclude='.env' \
                 --exclude='node_modules' \
                 --exclude='.next' \
                 --exclude='dist' \
                 -czf '$VPS_DEPLOY_PATH/.deploy-backups/release-'\"\$timestamp\"'.tar.gz' \
                 -C '$VPS_DEPLOY_PATH' .; \
               find '$VPS_DEPLOY_PATH/.deploy-backups' -type f -name 'release-*.tar.gz' -mtime +7 -delete; \
             fi"

      - name: Upload application files
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          set -Eeuo pipefail

          rsync \
            --archive \
            --compress \
            --delete \
            --human-readable \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='!.env.example' \
            --exclude='node_modules/' \
            --exclude='.next/' \
            --exclude='dist/' \
            --exclude='coverage/' \
            --exclude='logs/' \
            --exclude='.deploy-backups/' \
            -e "ssh -i $HOME/.ssh/deploy_key -p $VPS_PORT -o BatchMode=yes -o IdentitiesOnly=yes" \
            ./ \
            "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/"

      - name: Build and start Docker services
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          set -Eeuo pipefail

          ssh \
            -i "$HOME/.ssh/deploy_key" \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$VPS_USER@$VPS_HOST" \
            "set -Eeuo pipefail; \
             cd '$VPS_DEPLOY_PATH'; \
             docker --version; \
             docker compose version; \
             if [ -f docker-compose.prod.yml ]; then \
               compose_file='docker-compose.prod.yml'; \
             else \
               compose_file='docker-compose.yml'; \
             fi; \
             test -f .env || { echo 'Missing production .env at $VPS_DEPLOY_PATH/.env'; exit 1; }; \
             docker compose -f \"\$compose_file\" config --quiet; \
             docker compose -f \"\$compose_file\" up \
               --detach \
               --build \
               --remove-orphans \
               --wait \
               --wait-timeout 180; \
             docker compose -f \"\$compose_file\" ps; \
             docker image prune --force"

      - name: Remove temporary SSH key
        if: always()
        shell: bash
        run: |
          rm -f "$HOME/.ssh/deploy_key"
