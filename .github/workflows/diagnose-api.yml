name: Diagnose API Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/diagnose-api.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run API tests and report failure
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          cd apps/api
          npm test > /tmp/api-test.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo '### API test diagnostics'
              echo '```text'
              tail -n 120 /tmp/api-test.log
              echo '```'
            } > /tmp/api-comment.md
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/api-comment.md
            exit "$status"
          fi
