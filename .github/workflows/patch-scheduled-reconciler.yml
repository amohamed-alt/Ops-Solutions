name: Patch scheduled report reconciliation

on:
  push:
    branches:
      - feature/scheduled-report-orchestration

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[schedule-reconciler-integrated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/scheduled-report-orchestration
          fetch-depth: 0
      - name: Patch schedule reconciliation
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/api/src/scheduled-reports.js')
          text = path.read_text()
          marker = "  async function runDueSchedules(now = new Date()) {\n    const due = await postgres.query("
          replacement = """  async function runDueSchedules(now = new Date()) {
    await postgres.query(
      `UPDATE scheduled_report_executions e
       SET status = CASE WHEN x.status = 'completed' THEN 'ready_for_delivery' ELSE 'failed' END,
           delivery_status = CASE WHEN x.status = 'completed' THEN 'provider_not_configured' ELSE e.delivery_status END,
           error = CASE WHEN x.status = 'failed' THEN COALESCE(x.error, 'Export generation failed.') ELSE NULL END,
           completed_at = COALESCE(e.completed_at, NOW())
       FROM report_export_jobs x
       WHERE e.export_job_id = x.id
         AND e.status = 'exporting'
         AND x.status IN ('completed', 'failed')`
    );
    await postgres.query(
      `UPDATE scheduled_report_schedules s
       SET last_success_at = latest.completed_at, last_error = NULL, updated_at = NOW()
       FROM (
         SELECT schedule_id, MAX(completed_at) AS completed_at
         FROM scheduled_report_executions
         WHERE status = 'ready_for_delivery'
         GROUP BY schedule_id
       ) latest
       WHERE s.id = latest.schedule_id
         AND (s.last_success_at IS NULL OR s.last_success_at < latest.completed_at)`
    );
    await postgres.query(
      `UPDATE scheduled_report_schedules s
       SET last_failure_at = latest.completed_at, last_error = latest.error, updated_at = NOW()
       FROM (
         SELECT DISTINCT ON (schedule_id) schedule_id, completed_at, error
         FROM scheduled_report_executions
         WHERE status = 'failed'
         ORDER BY schedule_id, completed_at DESC NULLS LAST
       ) latest
       WHERE s.id = latest.schedule_id
         AND (s.last_failure_at IS NULL OR s.last_failure_at < latest.completed_at)`
    );
    const due = await postgres.query("""
          if marker not in text:
            raise SystemExit('runDueSchedules marker missing')
          text = text.replace(marker, replacement, 1)

          update_marker = """    const result = await postgres.query(
      `UPDATE scheduled_report_schedules SET saved_view_id=$3,name=$4,frequency=$5,weekday=$6,monthday=$7,"""
          update_replacement = """    const allowedView = await postgres.query(
      `SELECT 1 FROM saved_reporting_views WHERE id = $1 AND workspace_id = $2 AND user_id = $3 LIMIT 1`,
      [input.savedViewId, request.params.workspaceId, request.customer.user.id]
    );
    if (allowedView.rowCount === 0) throw scheduleError('Saved reporting view not found.', 'SAVED_VIEW_NOT_FOUND', 404);
    const result = await postgres.query(
      `UPDATE scheduled_report_schedules SET saved_view_id=$3,name=$4,frequency=$5,weekday=$6,monthday=$7,"""
          if update_marker not in text:
            raise SystemExit('update marker missing')
          path.write_text(text.replace(update_marker, update_replacement, 1))
          PY
          git rm .github/workflows/patch-scheduled-reconciler.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/api/src/scheduled-reports.js
          git commit -m "Reconcile scheduled report executions [schedule-reconciler-integrated]"
          git push origin HEAD:feature/scheduled-report-orchestration
